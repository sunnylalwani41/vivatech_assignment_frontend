<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivaTech RnD</title>
    <link rel="stylesheet" href="./style/index.css">
</head>

<body>

    <div id="login-background">
        <div class="login-container">
            <div class="popup-content">
                <span class="close" onclick="closePopup()">&times;</span>
            </div>
            
            <div class="login">
                <h2>Login / SignUp</h2>

                <form id="loginForm">
                    <input type="tel" min="10" max="10" id="contactNumber" placeholder="Enter Your Mobile Number" required>
                    <button type="submit" class="btn">Login / Sign Up</button>
                </form>
            </div>
            <div class="register-container">
                <hr>

                <h2>Other Details</h2>

                <form id="registerForm">
                    <input type="text" id="name" placeholder="Enter Your Name" required>
                    <select id="role" required>
                        <option value="">Select Your Role</option>
                    </select>
                    <button class="btn" id="registerBtn">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <div id="otp-verification-background">
        <div class="login-container">
            <div class="popup-content">
                <span class="close" onclick="closeOtpPopup()">&times;</span>
            </div>
            <div class="login">
                <h2>Otp</h2>

                <form id="otpForm">
                    <input type="number" min="6" max="6" id="otp" placeholder="Enter Otp" required>
                    <button type="submit" class="btn margin-top">Submit OTP</button>
                </form>
                <p id="resentOtp">Resent Otp</p>
            </div>
        </div>
    </div>

    <div class="navbar">

        <div class="logo">
            Viva Tech R&D
        </div>
        <div>
            <div class="nav-links">
                <button class="btn user-login">Login / SignUp</button>
            </div>

            <div class="nav-links">
                <button class="btn user-logout">Logout</button>
            </div>
        </div>
    </div>


    <div class="hero">

        <h1>Welcome to Viva Tech R&D</h1>

        <p>
            A modern backend platform built with Spring Boot, Role Based Access Control,
            and OTP Authentication to manage users securely and efficiently.
        </p>

        <button class="btn user-login margin-top-with-auto">
            Get Started
        </button>

    </div>
    <script src="./js/index.js"></script>
</body>

</html>
