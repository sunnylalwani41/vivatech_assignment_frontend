<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivaTech RnD</title>
    <link rel="stylesheet" href="">
</head>

<body>

<h2>User Registration</h2>

<div class="container">

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="contactNumber" placeholder="Enter Mobile Number">
    <input type="text" id="roleId" placeholder="Enter Role ID">

    <button onclick="addUser()">Add User</button>

    <hr>

    <h3>Send OTP</h3>

    <input type="text" id="otpMobile" placeholder="Mobile Number">

    <button onclick="sendOtp()">Send OTP</button>

    <hr>

    <h3>Verify OTP</h3>

    <input type="text" id="verifyMobile" placeholder="Mobile Number">
    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="verifyOtp()">Verify OTP</button>

    <p id="result"></p>

</div>

<script src="script.js"></script>

</body>
</html>
